name: BTS Parking Check

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 min: silent check (may be delayed)
    - cron: "0 9 * * 1"      # Mon 09:00 UTC: weekly heartbeat email
  workflow_dispatch:           # manual "Run workflow" button
    inputs:
      test_email:
        description: "Send a test email (with screenshot) instead of the silent check"
        type: boolean
        default: false

permissions:
  actions: write               # allow the job to disable this workflow

concurrency:
  group: bts-parking-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run checker
        id: check
        env:
          BTS_EMAIL: ${{ secrets.BTS_EMAIL }}
          BTS_APP_PASSWORD: ${{ secrets.BTS_APP_PASSWORD }}
          BTS_RECIPIENTS: ${{ secrets.BTS_RECIPIENTS }}
          BTS_WHATSAPP_PHONE: ${{ secrets.BTS_WHATSAPP_PHONE }}
          BTS_WHATSAPP_APIKEY: ${{ secrets.BTS_WHATSAPP_APIKEY }}
        run: |
          if [ "${{ inputs.test_email }}" = "true" ]; then
            echo "Manual test-email run."
            python checker.py --test-email
          elif [ "${{ github.event.schedule }}" = "0 9 * * 1" ]; then
            echo "Weekly heartbeat run."
            python checker.py --heartbeat
          else
            python checker.py
          fi

      - name: Upload page snapshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: last_page
          path: last_page.html
          if-no-files-found: ignore

      - name: Disable workflow after alert
        if: steps.check.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "July detected and email sent - disabling this workflow."
          gh workflow disable "BTS Parking Check"
